<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>北方住宅 図面ビューア</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c1520;--panel:#14243a;--panel2:#1a2f4a;
  --border:#1e3a5f;--accent:#2b7fff;--accent-dim:#1a4d99;
  --text:#e8f0fb;--muted:#6b8ab0;
  --grid-line:rgba(43,127,255,0.08);--r:10px;--hdr:56px;
}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
@keyframes spin{to{transform:rotate(360deg)}}
header{height:var(--hdr);background:var(--panel);border-bottom:1px solid var(--border);
  padding:0 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:300;
  background-image:linear-gradient(var(--grid-line) 1px,transparent 1px),
    linear-gradient(90deg,var(--grid-line) 1px,transparent 1px);
  background-size:24px 24px;background-color:var(--panel);}
.h-badge{width:32px;height:32px;background:var(--accent-dim);border:1px solid var(--accent);
  border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.h-title{font-size:14px;font-weight:800;letter-spacing:.06em;}
.h-sub{font-size:11px;color:var(--muted);}
#breadcrumb{display:none;align-items:center;gap:4px;padding:8px 16px;font-size:13px;
  background:var(--panel);border-bottom:1px solid var(--border);flex-wrap:wrap;
  position:sticky;top:var(--hdr);z-index:290;}
.bc-link{color:var(--accent);cursor:pointer;padding:2px 6px;border-radius:4px;}
.bc-link:hover{background:var(--panel2);}
.bc-sep{color:var(--border);}
.bc-cur{color:var(--text);}
main{flex:1;padding:20px 16px;max-width:960px;width:100%;margin:0 auto;}
.screen{display:none;}
.screen.active{display:block;}
.sec-label{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  color:var(--muted);margin-bottom:14px;}
.building-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:12px;}
.building-card{background:var(--panel);border:1px solid var(--border);border-radius:var(--r);
  padding:20px 16px 15px;cursor:pointer;transition:border-color .15s,background .15s,transform .1s;}
.building-card:hover{border-color:var(--accent);background:var(--panel2);}
.building-card:active{transform:scale(.97);}
.bc-name{font-size:21px;font-weight:900;color:var(--accent);letter-spacing:.08em;margin-bottom:5px;}
.bc-count{font-size:12px;color:var(--muted);}
.floor-header,.room-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px;}
.floor-tag,.room-building-tag{font-size:13px;font-weight:700;color:var(--accent);}
.floor-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px;}
.floor-btn{background:var(--panel);border:1px solid var(--border);border-radius:9px;
  padding:18px 10px;cursor:pointer;text-align:center;transition:border-color .15s,background .15s,transform .1s;}
.floor-btn:hover{border-color:var(--accent);background:var(--panel2);}
.floor-btn:active{transform:scale(.96);}
.floor-num{font-size:24px;font-weight:900;color:var(--accent);line-height:1;}
.floor-unit{font-size:12px;color:var(--muted);margin-top:3px;}
.floor-count{font-size:11px;color:var(--muted);margin-top:5px;}
.room-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(92px,1fr));gap:8px;}
.room-btn{background:var(--panel);border:1px solid var(--border);border-radius:8px;
  padding:14px 6px;font-size:15px;font-weight:700;color:var(--text);font-family:inherit;
  cursor:pointer;text-align:center;transition:border-color .15s,background .15s,color .15s,transform .1s;}
.room-btn:hover{border-color:var(--accent);background:var(--panel2);color:var(--accent);}
.room-btn:active{transform:scale(.95);}
#viewerOverlay{position:fixed;left:0;right:0;bottom:0;top:var(--hdr);
  z-index:200;background:var(--bg);display:none;flex-direction:column;}
#viewerOverlay.show{display:flex;}
.vo-top{height:42px;flex-shrink:0;background:var(--panel);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;padding:0 12px;}
.vo-back{background:transparent;border:1px solid var(--border);border-radius:6px;
  color:var(--muted);font-size:13px;font-family:inherit;cursor:pointer;
  padding:5px 10px;display:flex;align-items:center;gap:4px;
  transition:border-color .15s,color .15s;white-space:nowrap;flex-shrink:0;}
.vo-back:hover{border-color:var(--accent);color:var(--accent);}
.vo-title{font-size:14px;font-weight:700;overflow:hidden;text-overflow:ellipsis;
  white-space:nowrap;flex:1;min-width:0;}
.vo-counter{font-size:12px;color:var(--muted);background:var(--panel2);
  border:1px solid var(--border);border-radius:100px;padding:3px 10px;
  white-space:nowrap;flex-shrink:0;}
.vo-img{flex:1;position:relative;min-height:0;overflow:hidden;}
.img-wrap{width:100%;height:100%;overflow:auto;-webkit-overflow-scrolling:touch;
  display:flex;align-items:flex-start;justify-content:center;cursor:crosshair;}
#imgStage{position:relative;flex-shrink:0;}
#mainImg{display:block;height:auto;max-width:none;width:100%;user-select:none;-webkit-user-drag:none;}
.img-loading{position:absolute;inset:0;display:none;align-items:center;justify-content:center;
  flex-direction:column;gap:12px;background:var(--bg);font-size:14px;color:var(--muted);z-index:5;}
.img-loading.show{display:flex;}
.spinner{width:22px;height:22px;border:2px solid var(--border);
  border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
.side-nav{position:absolute;top:50%;transform:translateY(-50%);width:40px;height:90px;
  background:rgba(20,36,58,.75);border:1px solid var(--border);border-radius:8px;
  color:var(--text);font-size:28px;cursor:pointer;z-index:10;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .2s,background .15s;}
.side-nav.prev{left:8px;}
.side-nav.next{right:8px;}
.vo-img:hover .side-nav:not(:disabled){opacity:1;}
.side-nav:disabled{pointer-events:none;opacity:0!important;}
.side-nav:hover{background:rgba(43,127,255,.25);}
@media(hover:none){.side-nav:not(:disabled){opacity:.55;}}
.vo-bottom{height:50px;flex-shrink:0;background:var(--panel);border-top:1px solid var(--border);
  display:flex;align-items:center;padding:0 10px;gap:6px;}
.vb-sep{width:1px;height:22px;background:var(--border);margin:0 4px;flex-shrink:0;}
.vb-nav-btn{display:flex;align-items:center;gap:4px;background:transparent;
  border:1px solid var(--border);border-radius:7px;padding:6px 11px;
  font-size:12px;font-weight:700;color:var(--text);font-family:inherit;cursor:pointer;
  white-space:nowrap;transition:border-color .15s,background .15s,color .15s;}
.vb-nav-btn:hover:not(:disabled){border-color:var(--accent);background:var(--panel2);color:var(--accent);}
.vb-nav-btn:disabled{opacity:.3;cursor:not-allowed;}
.vb-zoom{display:flex;align-items:center;gap:4px;flex:1;justify-content:center;}
.zb{width:30px;height:30px;background:transparent;border:1px solid var(--border);border-radius:6px;
  color:var(--text);font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .12s,border-color .12s,color .12s;flex-shrink:0;}
.zb:hover{background:var(--panel2);border-color:var(--accent);color:var(--accent);}
.zb:active{transform:scale(.93);}
.zb.wide{width:auto;padding:0 9px;font-size:11px;font-weight:700;}
#zoomLabel{min-width:42px;text-align:center;font-size:13px;font-weight:700;color:var(--accent);flex-shrink:0;}
.vb-save{background:transparent;border:1px solid var(--border);border-radius:7px;
  padding:6px 11px;font-size:12px;color:var(--text);font-family:inherit;cursor:pointer;
  display:flex;align-items:center;gap:4px;white-space:nowrap;
  transition:border-color .15s,color .15s;flex-shrink:0;}
.vb-save:hover{border-color:var(--accent);color:var(--accent);}
.zoom-hint{position:fixed;bottom:64px;left:50%;transform:translateX(-50%);
  background:rgba(14,36,60,.93);border:1px solid var(--border);color:var(--muted);
  font-size:12px;padding:5px 14px;border-radius:100px;opacity:0;transition:opacity .22s;
  pointer-events:none;z-index:600;white-space:nowrap;}
.zoom-hint.show{opacity:1;}
.toast{position:fixed;bottom:64px;left:50%;transform:translateX(-50%);background:#1a7a3a;
  color:#fff;padding:9px 20px;border-radius:100px;font-size:14px;font-weight:600;
  opacity:0;transition:opacity .25s;z-index:700;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
@media(max-width:520px){
  main{padding:14px 10px;}
  .building-grid{grid-template-columns:repeat(2,1fr);}
  .floor-grid{grid-template-columns:repeat(3,1fr);}
  .room-grid{grid-template-columns:repeat(4,1fr);}
  .vb-nav-btn .lbl,.vb-save .lbl{display:none;}
}

/* ── 器具パネル ── */
.vo-body{flex:1;display:flex;min-height:0;}
.vo-draw{flex:1;min-width:0;display:flex;flex-direction:column;min-height:0;}
#fxPanel{width:340px;flex-shrink:0;background:var(--panel);border-left:1px solid var(--border);
  display:flex;flex-direction:column;min-height:0;transition:transform .25s cubic-bezier(.4,0,.2,1);}
.fp-head{padding:10px 13px 8px;border-bottom:1px solid var(--border);flex-shrink:0;}
.fp-head-t{font-size:12px;font-weight:800;letter-spacing:.04em;display:flex;align-items:center;gap:6px;}
.fp-head-t .dot{width:8px;height:8px;border-radius:50%;background:#e23b3b;box-shadow:0 0 0 3px rgba(226,59,59,.15);}
.fp-head-s{font-size:11px;color:var(--muted);margin-top:2px;}
.fp-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px;display:flex;flex-direction:column;gap:10px;}
.fp-empty{color:var(--muted);font-size:13px;padding:20px;text-align:center;}
.fp-card{background:var(--panel2);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.fp-card-head{display:flex;align-items:center;gap:9px;padding:9px 11px;border-bottom:1px solid var(--border);}
.fp-sym{font-size:13px;font-weight:900;color:#fff;background:#e23b3b;border-radius:6px;
  padding:5px 9px;letter-spacing:.02em;flex-shrink:0;min-width:54px;text-align:center;}
.fp-meta{min-width:0;}
.fp-model{font-size:12px;font-weight:800;color:#fff;word-break:break-all;line-height:1.3;}
.fp-color{font-size:10px;font-weight:800;color:#ffd479;white-space:nowrap;}
.fp-name{font-size:10.5px;color:#b9cce8;margin-top:2px;line-height:1.35;}
.fp-place{font-size:11px;color:#fff;margin-top:2px;word-break:break-word;}
.fp-qty{font-weight:700;}
.fp-imgbtn{display:block;width:100%;height:120px;border:0;background:#fff;cursor:zoom-in;padding:6px;position:relative;}
.fp-imgbtn img{display:block;width:100%;height:100%;object-fit:contain;}
.fp-nophoto{background:var(--panel2);display:flex;align-items:center;justify-content:center;
  height:70px;color:var(--muted);font-size:12px;font-weight:700;gap:6px;}
.fp-zoom{position:absolute;right:8px;bottom:8px;background:rgba(12,21,32,.8);color:#fff;
  font-size:11px;font-weight:700;padding:3px 9px;border-radius:100px;pointer-events:none;}
/* 取替不要(除外)オーバーレイ */
.fp-card.is-excluded{opacity:.7;}
.fp-card.is-excluded .fp-card-head{background:rgba(226,59,59,.08);}
.fp-card.is-excluded .fp-sym{background:#6b1f1f;}
.fp-excl-wrap{position:relative;}
.fp-excl-mark{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(8,12,18,.55);pointer-events:none;gap:4px;}
.fp-excl-x{font-size:54px;line-height:1;font-weight:900;color:#ff3b3b;
  text-shadow:0 0 10px rgba(0,0,0,.6),0 0 2px #fff;}
.fp-excl-label{background:#e23b3b;color:#fff;font-size:12px;font-weight:900;letter-spacing:.05em;
  padding:4px 14px;border-radius:100px;box-shadow:0 2px 8px rgba(0,0,0,.5);}
.fp-excl-badge{position:absolute;top:6px;right:6px;background:#e23b3b;color:#fff;font-size:10px;
  font-weight:800;padding:2px 8px;border-radius:100px;z-index:2;letter-spacing:.03em;}
#fxToggle{display:none;position:absolute;right:14px;bottom:64px;z-index:50;
  background:linear-gradient(135deg,var(--accent),#1a5fd6);color:#fff;
  border:2px solid rgba(255,255,255,.3);border-radius:100px;font-family:inherit;
  font-size:14px;font-weight:900;padding:13px 20px;cursor:pointer;
  align-items:center;gap:8px;
  box-shadow:0 4px 18px rgba(43,127,255,.55),0 0 0 0 rgba(43,127,255,.5);
  animation:fxPulse 2.2s ease-in-out infinite;}
@keyframes fxPulse{
  0%,100%{box-shadow:0 4px 18px rgba(43,127,255,.55),0 0 0 0 rgba(43,127,255,.45);}
  50%{box-shadow:0 4px 22px rgba(43,127,255,.75),0 0 0 9px rgba(43,127,255,0);}
}
.fx-toggle-badge{background:#fff;color:var(--accent);font-size:12px;font-weight:900;
  border-radius:100px;padding:1px 8px;min-width:20px;text-align:center;line-height:1.5;}
/* 右クリックパン用カーソル */
.img-wrap.panning{cursor:grabbing!important;}
.img-wrap.panning img{pointer-events:none;}
#fxLB{position:fixed;inset:0;z-index:600;background:rgba(6,12,20,.96);display:none;flex-direction:column;}
#fxLB.show{display:flex;}
.flb-top{height:46px;flex-shrink:0;display:flex;align-items:center;gap:10px;padding:0 14px;
  border-bottom:1px solid var(--border);background:var(--panel);}
.flb-t{font-size:13px;font-weight:800;color:var(--accent);}
.flb-x{margin-left:auto;background:transparent;border:1px solid var(--border);border-radius:7px;
  color:var(--text);font-size:12px;font-family:inherit;padding:5px 12px;cursor:pointer;}
.flb-x:hover{border-color:var(--accent);color:var(--accent);}
.flb-body{flex:1;overflow:auto;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:18px 14px;gap:12px;}
.flb-body img{display:block;background:#fff;border-radius:8px;width:min(560px,94vw);max-height:70vh;object-fit:contain;padding:14px;}
.flb-name{color:var(--text);font-size:13px;text-align:center;max-width:560px;line-height:1.5;}
@media(max-width:820px){
  #fxPanel{position:absolute;right:0;top:0;bottom:0;transform:translateX(101%);
    box-shadow:-6px 0 24px rgba(0,0,0,.5);width:min(340px,88vw);}
  #fxPanel.open{transform:translateX(0);}
  #fxToggle{display:flex;}
}

/* ── 点滅マーカー ── */
.blink-marker{
  position:absolute;width:34px;height:34px;margin-left:-17px;margin-top:-17px;
  border-radius:50%;pointer-events:none;z-index:50;
  border:3px solid #2b7fff;
  animation:blinkPulse .75s ease-out 5;
}
@keyframes blinkPulse{
  0%{opacity:0;transform:scale(.5);box-shadow:0 0 0 0 rgba(43,127,255,.9);}
  40%{opacity:1;transform:scale(1.1);box-shadow:0 0 0 10px rgba(43,127,255,0);}
  100%{opacity:0;transform:scale(1.5);}
}
.fp-card{cursor:pointer;transition:border-color .15s;}
.fp-card:hover{border-color:var(--accent)!important;}
.fp-card.blink-active{border-color:var(--accent)!important;background:#1c3357!important;}

.ks-sec{margin-top:14px;border-top:2px solid var(--border);padding-top:10px;}
.ks-head{font-size:12px;font-weight:700;color:var(--accent);margin-bottom:8px;letter-spacing:.03em;}
.ks-card{display:flex;gap:10px;align-items:center;background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:8px;margin-bottom:8px;}
.ks-imgbtn{position:relative;border:0;padding:3px;background:#fff;border-radius:6px;cursor:pointer;flex-shrink:0;}
.ks-imgbtn img{width:60px;height:60px;object-fit:contain;border-radius:4px;display:block;background:#fff;}
.ks-nophoto{width:66px;height:66px;flex-shrink:0;border-radius:6px;background:var(--panel);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--muted);text-align:center;}
.ks-meta{min-width:0;}
.ks-cat{font-weight:700;font-size:13px;color:var(--text);}
.ks-rooms{font-size:12px;color:var(--muted);margin-top:3px;word-break:break-word;}
.ks-card.is-excluded{opacity:.62;}
.ks-x{background:#e23b3b;color:#fff;font-size:10px;font-weight:800;padding:1px 8px;border-radius:100px;margin-left:4px;vertical-align:1px;}
</style>
</head>
<body>
<header>
  <div class="h-badge">📐</div>
  <div>
    <div class="h-title">北方住宅 図面ビューア</div>
    <div class="h-sub">県営北方住宅 室内照明LED化改修工事</div>
  </div>
</header>
<nav id="breadcrumb"></nav>
<main>
  <div id="sBuilding" class="screen active">
    <div class="sec-label">棟を選択</div>
    <div class="building-grid" id="buildingGrid"></div>
  </div>
  <div id="sFloor" class="screen">
    <div class="floor-header">
      <div class="sec-label" style="margin-bottom:0">階を選択</div>
      <div class="floor-tag" id="floorBldgTag"></div>
    </div>
    <div class="floor-grid" id="floorGrid"></div>
  </div>
  <div id="sRoom" class="screen">
    <div class="room-header">
      <div class="sec-label" style="margin-bottom:0">部屋番号を選択</div>
      <div class="room-building-tag" id="roomBldgTag"></div>
    </div>
    <div class="room-grid" id="roomGrid"></div>
  </div>
</main>
<div id="viewerOverlay">
  <div class="vo-top">
    <button class="vo-back" onclick="closeViewer()">← 戻る</button>
    <div class="vo-title" id="voTitle">—</div>
    <div class="vo-counter" id="voCounter">— / —</div>
  </div>
  <div class="vo-body">
    <div class="vo-draw">
      <div class="vo-img" id="voImg">
        <div class="img-loading" id="imgLoading"><div class="spinner"></div><span>読み込み中...</span></div>
        <div class="img-wrap" id="imgWrap"><div id="imgStage"><img id="mainImg" src="" alt="図面" draggable="false"></div></div>
        <button class="side-nav prev" id="btnSidePrev" onclick="goPrev()">‹</button>
        <button class="side-nav next" id="btnSideNext" onclick="goNext()">›</button>
        <button id="fxToggle" onclick="toggleFxPanel()">📋 器具<span class="fx-toggle-badge" id="fxToggleBadge">–</span></button>
      </div>
      <div class="vo-bottom">
    <button class="vb-nav-btn" id="btnPrev" onclick="goPrev()">← <span class="lbl">前</span></button>
    <button class="vb-nav-btn" id="btnNext" onclick="goNext()"><span class="lbl">次</span> →</button>
    <div class="vb-sep"></div>
    <div class="vb-zoom">
      <button class="zb" onclick="zoomOut()">－</button>
      <span id="zoomLabel">100%</span>
      <button class="zb" onclick="zoomIn()">＋</button>
      <button class="zb wide" onclick="zoomFitAll()">全体</button>
      <button class="zb wide" onclick="zoomFitWidth()">幅</button>
      <button class="zb wide" onclick="zoomActual()">1:1</button>
    </div>
    <div class="vb-sep"></div>
    <button class="vb-save" onclick="downloadImg()">⬇ <span class="lbl">保存</span></button>
      </div><!-- vo-bottom -->
    </div><!-- vo-draw -->
    <aside id="fxPanel">
      <div class="fp-head">
        <div class="fp-head-t"><span class="dot"></span>改修器具リスト</div>
        <div class="fp-head-s" id="fpSub">―</div>
      </div>
      <div class="fp-list" id="fpList"><div class="fp-empty">部屋を選択してください</div></div>
    </aside>
  </div><!-- vo-body -->
</div><!-- viewerOverlay -->
<div id="fxLB">
  <div class="flb-top">
    <span class="flb-t" id="flbTitle">—</span>
    <button class="flb-x" onclick="closeFxLB()">✕ 閉じる</button>
  </div>
  <div class="flb-body" id="flbBody"></div>
</div>
<div class="zoom-hint" id="zoomHint"></div>

const STRUCT = DATA.structure;
const DRAWINGS = DATA.drawings;
const ORDER = ['A1棟','A2棟','A4棟','S1棟','S2棟','S3棟','S4棟'];
let curBldg=null, curFloor=null, curRoom=null, zoomPct=100, hintTimer=null;
let flatRooms=[], curIdx=-1;
const ZOOM_MIN=10,ZOOM_MAX=500,STEP_BTN=25,STEP_WHEEL=10;
const $=id=>document.getElementById(id);
function buildFlat(bldg){
  flatRooms=[];
  const floors=STRUCT[bldg];
  Object.keys(floors).map(Number).sort((a,b)=>a-b).forEach(fl=>{
    floors[fl].forEach(r=>flatRooms.push({bldg,floor:fl,room:r}));
  });
}
function renderBuildings(){
  const g=$('buildingGrid');g.innerHTML='';
  ORDER.forEach(b=>{
    if(!STRUCT[b])return;
    let total=0;Object.values(STRUCT[b]).forEach(a=>total+=a.length);
    const d=document.createElement('div');
    d.className='building-card';
    d.innerHTML='<div class="bc-name">'+b+'</div><div class="bc-count">'+total+' 室</div>';
    d.onclick=()=>selectBuilding(b);
    g.appendChild(d);
  });
}
function showScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  $('s'+name).classList.add('active');
  renderBC();window.scrollTo(0,0);
}
function selectBuilding(b){
  curBldg=b;buildFlat(b);
  $('floorBldgTag').textContent=b;
  const g=$('floorGrid');g.innerHTML='';
  const floors=STRUCT[b];
  Object.keys(floors).map(Number).sort((a,b)=>a-b).forEach(fl=>{
    const btn=document.createElement('div');
    btn.className='floor-btn';
    btn.innerHTML='<div class="floor-num">'+fl+'</div><div class="floor-unit">階</div><div class="floor-count">'+floors[fl].length+' 室</div>';
    btn.onclick=()=>selectFloor(fl);
    g.appendChild(btn);
  });
  showScreen('Floor');
}
function selectFloor(fl){
  curFloor=fl;
  $('roomBldgTag').textContent=curBldg+'  '+fl+'階';
  const g=$('roomGrid');g.innerHTML='';
  STRUCT[curBldg][fl].forEach(r=>{
    const btn=document.createElement('button');
    btn.className='room-btn';
    btn.textContent=r;
    btn.onclick=()=>selectRoom(r);
    g.appendChild(btn);
  });
  showScreen('Room');
}
function selectRoom(r){
  curRoom=r;
  curIdx=flatRooms.findIndex(x=>x.floor===curFloor&&x.room===r);
  openViewer();loadDrawing();
}
function loadDrawing(){
  const key=curBldg+'|'+curRoom;
  const dwg=DRAWINGS[key];
  $('voTitle').textContent=curBldg+' '+curRoom+'号室';
  updateNavUI();
  if(!dwg){
    $('imgLoading').classList.remove('show');
    $('mainImg').style.display='none';
    showToast('この部屋の図面が見つかりません');
    return;
  }
  $('mainImg').style.display='block';
  $('imgLoading').classList.add('show');
  $('imgWrap').style.opacity='0';
  const img=$('mainImg');
  img.onload=()=>{$('imgLoading').classList.remove('show');$('imgWrap').style.opacity='1';requestAnimationFrame(()=>requestAnimationFrame(()=>{applyZoom(75);$('imgWrap').scrollTop=0;$('imgWrap').scrollLeft=0;}));};
  img.onerror=()=>{$('imgLoading').classList.remove('show');$('imgWrap').style.opacity='1';showToast('画像の読み込みに失敗');};
  img.src='images/'+encodeURIComponent(dwg)+'.png';
}
function openViewer(){$('viewerOverlay').classList.add('show');renderBC();}
function closeViewer(){$('viewerOverlay').classList.remove('show');showScreen('Room');}
function updateNavUI(){
  const total=flatRooms.length;
  $('voCounter').textContent=(curIdx+1)+' / '+total;
  const dp=curIdx<=0,dn=curIdx>=total-1;
  [$('btnPrev'),$('btnSidePrev')].forEach(b=>b.disabled=dp);
  [$('btnNext'),$('btnSideNext')].forEach(b=>b.disabled=dn);
}
function goPrev(){if(curIdx<=0)return;curIdx--;const x=flatRooms[curIdx];curFloor=x.floor;curRoom=x.room;loadDrawing();}
function goNext(){if(curIdx>=flatRooms.length-1)return;curIdx++;const x=flatRooms[curIdx];curFloor=x.floor;curRoom=x.room;loadDrawing();}
function _refreshBMarkers(){
  if(!_bMarkers.length) return;
  const stage=document.getElementById('imgStage');
  const sw=stage.offsetWidth||1;
  const sh=stage.offsetHeight||1;
  _bMarkers.forEach(m=>{
    const ox=parseFloat(m.dataset.ox||'50');
    const oy=parseFloat(m.dataset.oy||'50');
    m.style.left=(ox/100*sw)+'px';
    m.style.top=(oy/100*sh)+'px';
  });
}
function applyZoom(pct,cx,cy){
  pct=Math.max(ZOOM_MIN,Math.min(ZOOM_MAX,Math.round(pct)));
  const wrap=$('imgWrap'),img=$('mainImg');
  const pw=img.offsetWidth||1,ph=img.offsetHeight||1;
  const ax=cx!=null?(cx+wrap.scrollLeft)/pw:0.5;
  const ay=cy!=null?(cy+wrap.scrollTop)/ph:0;
  zoomPct=pct;$('zoomLabel').textContent=pct+'%';
  document.getElementById('imgStage').style.width=(wrap.clientWidth*pct/100)+'px';
  requestAnimationFrame(()=>{if(cx!=null){wrap.scrollLeft=ax*img.offsetWidth-cx;wrap.scrollTop=ay*img.offsetHeight-cy;}_refreshBMarkers();});
}
function zoomIn(){applyZoom(zoomPct+STEP_BTN);}
function zoomOut(){applyZoom(zoomPct-STEP_BTN);}
function zoomFitWidth(){applyZoom(100);}
function zoomFitAll(){const w=$('imgWrap'),img=$('mainImg');if(!img.naturalWidth)return;const rect=w.getBoundingClientRect();const cw=rect.width||w.offsetWidth;const ch=rect.height||w.offsetHeight;if(!cw||!ch){setTimeout(zoomFitAll,40);return;}const pctH=Math.floor(ch*img.naturalWidth/(img.naturalHeight*cw)*100);applyZoom(Math.max(1,Math.min(100,pctH)));w.scrollTop=0;w.scrollLeft=0;}
function zoomActual(){const img=$('mainImg'),w=$('imgWrap');if(!img.naturalWidth)return;applyZoom(Math.round(img.naturalWidth/w.clientWidth*100));}
$('imgWrap').addEventListener('wheel',e=>{e.preventDefault();const r=$('imgWrap').getBoundingClientRect();applyZoom(zoomPct+(e.deltaY<0?STEP_WHEEL:-STEP_WHEEL),e.clientX-r.left,e.clientY-r.top);showHint(zoomPct+'%');},{passive:false});
let swipeX=0,swipeY=0,swipeMulti=false;
$('imgWrap').addEventListener('touchstart',e=>{swipeMulti=e.touches.length>1;swipeX=e.touches[0].clientX;swipeY=e.touches[0].clientY;},{passive:true});
$('imgWrap').addEventListener('touchmove',e=>{if(e.touches.length>1)swipeMulti=true;},{passive:true});
$('imgWrap').addEventListener('touchend',e=>{if(swipeMulti){swipeMulti=false;return;}if(e.touches.length>0)return;if(zoomPct>80)return;const diff=swipeX-e.changedTouches[0].clientX;const diffY=Math.abs(swipeY-e.changedTouches[0].clientY);if(diffY>60)return;if(Math.abs(diff)>100){if(diff>0)goNext();else goPrev();}});
function showHint(m){const h=$('zoomHint');h.textContent=m;h.classList.add('show');clearTimeout(hintTimer);hintTimer=setTimeout(()=>h.classList.remove('show'),900);}
document.addEventListener('keydown',e=>{
  if(!$('viewerOverlay').classList.contains('show'))return;
  if(e.key==='ArrowLeft'){e.preventDefault();goPrev();}
  if(e.key==='ArrowRight'){e.preventDefault();goNext();}
  if(e.key==='Escape'){e.preventDefault();closeViewer();}
  if(e.key==='+'||e.key==='='){e.preventDefault();zoomIn();showHint(zoomPct+'%');}
  if(e.key==='-'){e.preventDefault();zoomOut();showHint(zoomPct+'%');}
  if(e.key==='0'){e.preventDefault();zoomFitAll();showHint('全体');}
  if(e.key==='w'||e.key==='W'){e.preventDefault();zoomFitWidth();showHint('幅');}
  if(e.key==='1'){e.preventDefault();zoomActual();showHint('実寸');}
});
function downloadImg(){const img=$('mainImg');if(!img.src)return;const a=document.createElement('a');a.href=img.src;a.download=curBldg+'_'+curRoom+'.png';a.click();showToast('保存しました ✓');}
function renderBC(){
  const bc=$('breadcrumb');
  if($('viewerOverlay').classList.contains('show')){bc.style.display='none';return;}
  const active=document.querySelector('.screen.active')?.id;
  if(!active||active==='sBuilding'){bc.style.display='none';return;}
  bc.style.display='flex';bc.innerHTML='';
  const mk=(label,fn)=>{const s=document.createElement('span');s.textContent=label;s.className=fn?'bc-link':'bc-cur';if(fn)s.onclick=fn;return s;};
  const sep=()=>{const s=document.createElement('span');s.className='bc-sep';s.textContent='›';return s;};
  bc.appendChild(mk('棟一覧',()=>showScreen('Building')));
  if(active==='sFloor'){bc.appendChild(sep());bc.appendChild(mk(curBldg,null));}
  if(active==='sRoom'){bc.appendChild(sep());bc.appendChild(mk(curBldg,()=>selectBuilding(curBldg)));bc.appendChild(sep());bc.appendChild(mk(curFloor+'階',null));}
}

function renderFxPanel(bldg, room){
  const key=bldg+'|'+room;
  const items=ROOM_FIXTURES[key]||[];
  const list=document.getElementById('fpList');
  const sub =document.getElementById('fpSub');
  const badge=document.getElementById('fxToggleBadge');
  list.innerHTML='';
  if(!items.length){
    list.innerHTML='<div class="fp-empty">器具データなし</div>';
    sub.textContent='改修器具データなし';
    if(badge) badge.textContent='0';
    list.insertAdjacentHTML('beforeend', renderKishu(bldg,room));
    return;
  }
  const exclSet = new Set(EXCLUDED_ROOMS[key] || []);
  const qtyOf=it=>it.p.reduce((s,pq)=>s+pq[1],0);
  const total=items.reduce((s,i)=>s+qtyOf(i),0);
  const exclQty=items.filter(i=>exclSet.has(i.s)).reduce((s,i)=>s+qtyOf(i),0);
  const activeCount=items.filter(i=>!exclSet.has(i.s)).length;
  if(badge) badge.textContent=String(activeCount);
  sub.textContent='器具 '+items.length+' 種 / 計 '+total+' 台'
    +(exclQty>0?'　（うち取替不要 '+exclQty+' 台）':'');
  items.forEach(it=>{
    const info=FIXTURE_INFO[it.s]||{};
    const isExcl=exclSet.has(it.s);
    const places=it.p.map(pq=>pq[0]+'×'+pq[1]).join(' ・ ');
    const enc=encodeURIComponent(it.s.toLowerCase());
    const photoBtn='<button class="fp-imgbtn" onclick="event.stopPropagation();openFxLB(\''+it.s+'\')">'
      +'<img src="photos/'+enc+'.jpg" alt="'+it.s+'" loading="lazy">'
      +'<span class="fp-zoom">🔍</span></button>';
    const imgHtml = isExcl
      ? '<div class="fp-excl-wrap">'+photoBtn
        +'<div class="fp-excl-mark"><span class="fp-excl-x">✕</span>'
        +'<span class="fp-excl-label">取替不要</span></div></div>'
      : photoBtn;
    const badgeHtml = isExcl ? '<span class="fp-excl-badge">取替不要</span>' : '';
    list.insertAdjacentHTML('beforeend',
      '<div class="fp-card'+(isExcl?' is-excluded':'')+'" style="position:relative;" onclick="onFpCardClick(this,\''+it.s+'\')">'+badgeHtml
      +'<div class="fp-card-head">'
      +'<span class="fp-sym">'+it.s+'</span>'
      +'<div class="fp-meta">'
      +'<div class="fp-model">'+(info.model||'')+(info.color?' <span class="fp-color">'+info.color+'</span>':'')+'</div>'
      +(info.name?'<div class="fp-name">'+info.name+'</div>':'')
      +'<div class="fp-place">'+places+' <span class="fp-qty">計×'+qtyOf(it)+'</span></div>'
      +'</div></div>'+imgHtml+'</div>');
  });
  list.insertAdjacentHTML('beforeend', renderKishu(bldg,room));
}
function renderKishu(bldg,room){
  const gs=(KISHU_DATA[bldg+'|'+room]||[]);
  if(!gs.length) return '';
  let h='<div class="ks-sec"><div class="ks-head">器具種類（写真区分）</div>';
  gs.forEach(g=>{
    const img = g.s
      ? '<button class="ks-imgbtn" onclick="openFxLB(\''+g.s+'\')"><img src="photos/'+encodeURIComponent(g.s.toLowerCase())+'.jpg" alt="'+g.c+'" loading="lazy"><span class="fp-zoom">🔍</span></button>'
      : '<div class="ks-nophoto">📷 なし</div>';
    h+='<div class="ks-card'+(g.x?' is-excluded':'')+'">'+img
      +'<div class="ks-meta"><div class="ks-cat">'+g.c+(g.x?' <span class="ks-x">取替不要</span>':'')+'</div>'
      +'<div class="ks-rooms">'+g.l+'</div></div></div>';
  });
  return h+'</div>';
}
function toggleFxPanel(){document.getElementById('fxPanel').classList.toggle('open');}
function openFxLB(sym){
  const info=FIXTURE_INFO[sym]||{};
  document.getElementById('flbTitle').textContent=sym+(info.model?'　'+info.model:'')+(info.color?'　'+info.color:'');
  document.getElementById('flbBody').innerHTML='<img src="photos/'+encodeURIComponent(sym.toLowerCase())+'.jpg" alt="'+sym+'">'
    +(info.name?'<div class="flb-name">'+info.name+'</div>':'');
  document.getElementById('fxLB').classList.add('show');
}
function closeFxLB(){
  document.getElementById('fxLB').classList.remove('show');
  document.getElementById('flbBody').innerHTML='';
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeFxLB();});
document.getElementById('fxLB').addEventListener('click',e=>{
  if(e.target.id==='fxLB'||e.target.id==='flbBody')closeFxLB();

});

// 右クリックドラッグでパン (PC)
(function(){
  const wrap=$('imgWrap');
  let panning=false,panStartX=0,panStartY=0,panSL=0,panST=0,moved=false;
  wrap.addEventListener('contextmenu',e=>{ if(moved) e.preventDefault(); });
  wrap.addEventListener('mousedown',e=>{
    if(e.button!==2) return;
    panning=true; moved=false;
    panStartX=e.clientX; panStartY=e.clientY;
    panSL=wrap.scrollLeft; panST=wrap.scrollTop;
    wrap.classList.add('panning');
    e.preventDefault();
  });
  window.addEventListener('mousemove',e=>{
    if(!panning) return;
    const dx=e.clientX-panStartX, dy=e.clientY-panStartY;
    if(Math.abs(dx)>3||Math.abs(dy)>3) moved=true;
    wrap.scrollLeft=panSL-dx;
    wrap.scrollTop=panST-dy;
  });
  window.addEventListener('mouseup',e=>{
    if(e.button!==2) return;
    panning=false;
    wrap.classList.remove('panning');
    setTimeout(()=>{moved=false;},50);
  });
  window.addEventListener('blur',()=>{panning=false;wrap.classList.remove('panning');});
})();

// ── 点滅マーカー ──────────────────────────────────────────
let _bMarkers=[];
function _clearBMarkers(){_bMarkers.forEach(m=>m.remove());_bMarkers=[];}
function _placeBMarkers(syms){
  _clearBMarkers();
  const dwg=DRAWINGS[curBldg+'|'+curRoom];
  if(!dwg||!SYMBOL_COORDS[dwg]) return;
  const stage=document.getElementById('imgStage');
  const sw=stage.offsetWidth||1;
  const sh=stage.offsetHeight||1;
  const wrap=$('imgWrap');
  const baseSym=s=>s.replace(/-\d$/,'');
  const symSet=new Set(syms.map(baseSym));
  let firstM=null;
  SYMBOL_COORDS[dwg].forEach(pt=>{
    if(!symSet.has(baseSym(pt.s))) return;
    const el=document.createElement('div');
    el.className='blink-marker';
    el.style.left=(pt.x/100*sw)+'px';
    el.style.top=(pt.y/100*sh)+'px';
    el.dataset.ox=pt.x;
    el.dataset.oy=pt.y;
    stage.appendChild(el);
    _bMarkers.push(el);
    if(!firstM) firstM=el;
  });
  if(firstM){
    const ml=parseFloat(firstM.style.left),mt=parseFloat(firstM.style.top);
    const rect=wrap.getBoundingClientRect();
    wrap.scrollTo({left:ml-rect.width/2,top:mt-rect.height/2,behavior:'smooth'});
  }
}
function onFpCardClick(card,sym){
  document.querySelectorAll('.fp-card.blink-active').forEach(c=>c.classList.remove('blink-active'));
  card.classList.add('blink-active');
  _placeBMarkers([sym]);
}
