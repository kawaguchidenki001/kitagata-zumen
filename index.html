<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>北方住宅 図面ビューア</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c1520;--panel:#14243a;--panel2:#1a2f4a;
  --border:#1e3a5f;--accent:#2b7fff;--accent-dim:#1a4d99;
  --text:#e8f0fb;--muted:#6b8ab0;
  --grid-line:rgba(43,127,255,0.08);--r:10px;--hdr:56px;
}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
@keyframes spin{to{transform:rotate(360deg)}}
header{height:var(--hdr);background:var(--panel);border-bottom:1px solid var(--border);
  padding:0 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:300;
  background-image:linear-gradient(var(--grid-line) 1px,transparent 1px),
    linear-gradient(90deg,var(--grid-line) 1px,transparent 1px);
  background-size:24px 24px;background-color:var(--panel);}
.h-badge{width:32px;height:32px;background:var(--accent-dim);border:1px solid var(--accent);
  border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.h-title{font-size:14px;font-weight:800;letter-spacing:.06em;}
.h-sub{font-size:11px;color:var(--muted);}
#breadcrumb{display:none;align-items:center;gap:4px;padding:8px 16px;font-size:13px;
  background:var(--panel);border-bottom:1px solid var(--border);flex-wrap:wrap;
  position:sticky;top:var(--hdr);z-index:290;}
.bc-link{color:var(--accent);cursor:pointer;padding:2px 6px;border-radius:4px;}
.bc-link:hover{background:var(--panel2);}
.bc-sep{color:var(--border);}
.bc-cur{color:var(--text);}
main{flex:1;padding:20px 16px;max-width:960px;width:100%;margin:0 auto;}
/* 割付図表示中は画面全体を使う */
body.map-full main{max-width:none;padding:12px 14px;}
.screen{display:none;}
.screen.active{display:block;animation:screenIn .22s ease;}
@keyframes screenIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.sec-label{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  color:var(--muted);margin-bottom:14px;}
.building-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:12px;}
.building-card{background:var(--panel);border:1px solid var(--border);border-radius:var(--r);
  padding:20px 16px 15px;cursor:pointer;transition:border-color .15s,background .15s,transform .1s;}
.building-card:hover{border-color:var(--accent);background:var(--panel2);}
.building-card:active{transform:scale(.97);}
.bc-name{font-size:22px;font-weight:900;color:var(--accent);letter-spacing:.08em;margin-bottom:5px;}
/* A棟系=青 / S棟系=オレンジ の色分け（背景・枠・左帯で明確化） */
.building-grid+.building-grid{margin-top:12px;}
.building-card{position:relative;overflow:hidden;padding-left:22px;}
.building-card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:8px;}
.building-card.a-b{border-color:rgba(43,127,255,.55);background:linear-gradient(180deg,rgba(43,127,255,.12),rgba(43,127,255,.04));}
.building-card.a-b::before{background:#2b7fff;}
.building-card.a-b .bc-name{color:#5fa2ff;}
.building-card.a-b:hover{border-color:#2b7fff;background:rgba(43,127,255,.18);}
.building-card.s-b{border-color:rgba(255,150,60,.55);background:linear-gradient(180deg,rgba(255,150,60,.12),rgba(255,150,60,.04));}
.building-card.s-b::before{background:#ff963c;}
.building-card.s-b .bc-name{color:#ffab5e;}
.building-card.s-b:hover{border-color:#ff963c;background:rgba(255,150,60,.18);}
.grp-a{margin-bottom:14px;}
.grp-tag{font-size:11px;font-weight:800;letter-spacing:.1em;margin:0 0 7px 2px;}
.grp-a>.grp-tag{color:#5fa2ff;}
.grp-s>.grp-tag{color:#ffab5e;}
/* 空家ボタン（3段目） */
.vacant-row{margin-top:18px;}
.vacant-btn{width:100%;max-width:360px;display:flex;align-items:center;justify-content:center;gap:10px;
  background:linear-gradient(135deg,#1f6b3a,#2fa35a);border:1px solid #37c46f;border-radius:var(--r);
  color:#fff;font-family:inherit;font-size:16px;font-weight:900;letter-spacing:.06em;padding:16px 20px;
  cursor:pointer;transition:filter .15s,transform .1s;box-shadow:0 3px 14px rgba(47,163,90,.35);}
.vacant-btn:hover{filter:brightness(1.12);}
.vacant-btn:active{transform:scale(.98);}
.vacant-btn .v-count{background:rgba(255,255,255,.9);color:#1f6b3a;font-size:13px;font-weight:900;
  border-radius:100px;padding:1px 10px;}
.vacant-btn.exit{background:linear-gradient(135deg,#2a3a4f,#3a4d68);border-color:var(--border);
  box-shadow:none;font-size:14px;}
.building-card.vac-card::after{content:"空家";position:absolute;top:8px;right:10px;
  background:#2fa35a;color:#fff;font-size:10px;font-weight:800;border-radius:100px;padding:2px 9px;}
.vacant-badge{display:inline-block;background:#2fa35a;color:#fff;font-size:11px;font-weight:800;
  border-radius:100px;padding:2px 10px;margin-left:8px;vertical-align:2px;letter-spacing:.04em;}
.bc-count{font-size:12px;color:var(--muted);}
.floor-header,.room-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:10px;flex-wrap:wrap;}
/* 系統色（A=青 / S=オレンジ / 空家=緑）を --sc で引き継ぐ */
.ser-a{--sc:#2b7fff;--sc-soft:rgba(43,127,255,.14);--sc-line:rgba(43,127,255,.45);--sc-text:#5fa2ff;}
.ser-s{--sc:#ff963c;--sc-soft:rgba(255,150,60,.14);--sc-line:rgba(255,150,60,.45);--sc-text:#ffab5e;}
.ser-v{--sc:#2fa35a;--sc-soft:rgba(47,163,90,.16);--sc-line:rgba(55,196,111,.5);--sc-text:#5fd68f;}
.hdr-chip{font-size:13px;font-weight:800;letter-spacing:.05em;color:var(--sc-text);
  background:var(--sc-soft);border:1px solid var(--sc-line);border-radius:100px;padding:5px 16px;}
.floor-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(124px,1fr));gap:12px;}
.floor-btn{position:relative;overflow:hidden;background:linear-gradient(180deg,var(--sc-soft),transparent 55%),var(--panel);
  border:1px solid var(--border);border-radius:12px;
  padding:18px 10px 14px;cursor:pointer;text-align:center;
  transition:border-color .15s,background .15s,transform .12s,box-shadow .15s;}
.floor-btn::before{content:"";position:absolute;left:0;right:0;top:0;height:4px;background:var(--sc);opacity:.9;}
.floor-btn:hover{border-color:var(--sc);transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,.35);}
.floor-btn:active{transform:scale(.96);}
.floor-num-row{display:flex;align-items:baseline;justify-content:center;gap:4px;}
.floor-num{font-size:32px;font-weight:900;color:var(--sc-text);line-height:1;}
.floor-unit{font-size:13px;color:var(--muted);font-weight:700;}
.floor-count{font-size:11px;color:var(--muted);margin-top:8px;display:flex;justify-content:center;align-items:center;gap:6px;flex-wrap:wrap;}
.fl-vac{background:rgba(47,163,90,.16);border:1px solid rgba(55,196,111,.5);color:#5fd68f;
  font-size:10px;font-weight:800;border-radius:100px;padding:1px 8px;white-space:nowrap;}
.room-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:10px;}
.room-btn{position:relative;overflow:hidden;background:linear-gradient(180deg,var(--sc-soft),transparent 60%),var(--panel);
  border:1px solid var(--border);border-radius:11px;
  padding:18px 6px 15px;font-size:18px;font-weight:800;color:var(--text);font-family:inherit;
  letter-spacing:.03em;cursor:pointer;text-align:center;
  transition:border-color .15s,background .15s,color .15s,transform .12s,box-shadow .15s;}
.room-btn::before{content:"";position:absolute;left:0;right:0;top:0;height:3px;background:var(--sc);opacity:.55;}
.room-btn:hover{border-color:var(--sc);color:var(--sc-text);transform:translateY(-2px);box-shadow:0 6px 14px rgba(0,0,0,.35);}
.room-btn:active{transform:scale(.95);}
/* 空家の部屋マーク */
.room-btn.rb-vac{border-color:rgba(55,196,111,.45);}
.room-btn.rb-vac::after{content:"";position:absolute;top:8px;right:9px;width:9px;height:9px;border-radius:50%;
  background:#37c46f;box-shadow:0 0 6px rgba(55,196,111,.9);}
.vac-legend{font-size:11.5px;color:#5fd68f;font-weight:700;display:flex;align-items:center;gap:5px;}
.vac-legend::before{content:"";width:9px;height:9px;border-radius:50%;background:#37c46f;box-shadow:0 0 6px rgba(55,196,111,.9);}
/* 住戸割付図 */
.map-open-btn{width:100%;max-width:360px;display:flex;align-items:center;justify-content:center;gap:10px;
  background:linear-gradient(135deg,#4a3d9e,#6c5ce7);border:1px solid #8577f0;border-radius:var(--r);
  color:#fff;font-family:inherit;font-size:16px;font-weight:900;letter-spacing:.06em;padding:16px 20px;
  cursor:pointer;transition:filter .15s,transform .1s;box-shadow:0 3px 14px rgba(108,92,231,.35);}
.map-open-btn:hover{filter:brightness(1.12);}
.map-open-btn:active{transform:scale(.98);}
.map-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:10px;flex-wrap:wrap;}
.map-tabs{display:flex;gap:7px;flex-wrap:wrap;}
.map-tab{font-family:inherit;font-size:13px;font-weight:800;letter-spacing:.04em;padding:7px 15px;
  border-radius:100px;border:1px solid var(--border);background:var(--panel);color:var(--muted);
  cursor:pointer;transition:border-color .15s,background .15s,color .15s;}
.map-tab.mt-a.on{background:rgba(43,127,255,.16);border-color:#2b7fff;color:#5fa2ff;}
.map-tab.mt-s.on{background:rgba(255,150,60,.16);border-color:#ff963c;color:#ffab5e;}
.map-tab:hover{border-color:var(--sc,#5fa2ff);}
.map-legend{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
.ml-item{font-size:11.5px;font-weight:800;letter-spacing:.04em;border-radius:100px;padding:3px 12px;border:1px solid;}
.ml-vac{background:rgba(47,163,90,.16);border-color:rgba(55,196,111,.55);color:#5fd68f;}
.ml-sched{background:rgba(255,150,60,.16);border-color:rgba(255,150,60,.55);color:#ffab5e;}
.ml-done{background:rgba(43,127,255,.16);border-color:rgba(43,127,255,.55);color:#5fa2ff;}
.ml-note{font-size:11.5px;color:var(--muted);}
.map-wrap{overflow:auto;border:1px solid var(--border);border-radius:12px;background:#fff;
  max-height:calc(100vh - var(--hdr) - 150px);
  touch-action:pan-x pan-y;cursor:grab;}
.map-wrap.panning{cursor:grabbing;}
#imgWrap{touch-action:pan-x pan-y;}
.map-inner{position:relative;width:100%;}
.map-img{display:block;width:100%;height:auto;user-select:none;-webkit-user-drag:none;}
.map-cell{position:absolute;cursor:pointer;border:1.5px solid transparent;border-radius:4px;
  transition:border-color .12s,background .12s;}
.map-cell:hover{border-color:#2b7fff;background:rgba(43,127,255,.14);}
.map-cell.mc-vac{background:rgba(47,163,90,.20);border-color:rgba(31,138,66,.6);}
.map-cell.mc-sched{background:rgba(255,150,60,.22);border-color:rgba(214,120,25,.65);}
.map-cell.mc-done{background:rgba(43,127,255,.18);border-color:rgba(43,111,212,.6);}
.mc-tag{position:absolute;left:50%;bottom:2px;transform:translateX(-50%);font-size:10px;font-weight:800;
  line-height:1.15;padding:1px 5px;border-radius:3px;color:#fff;white-space:nowrap;pointer-events:none;}
.tg-vac{background:#1f8a42;}
.tg-sched{background:#d67819;}
.tg-done{background:#2b6fd4;}
#viewerOverlay{position:fixed;left:0;right:0;bottom:0;top:var(--hdr);
  z-index:200;background:var(--bg);display:none;flex-direction:column;}
#viewerOverlay.show{display:flex;}
.vo-top{height:50px;flex-shrink:0;background:var(--panel);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;padding:0 12px;}
.vo-back{background:transparent;border:1px solid var(--border);border-radius:6px;
  color:var(--muted);font-size:13px;font-family:inherit;cursor:pointer;
  padding:5px 10px;display:flex;align-items:center;gap:4px;
  transition:border-color .15s,color .15s;white-space:nowrap;flex-shrink:0;}
.vo-back:hover{border-color:var(--accent);color:var(--accent);}
.vo-title{font-size:20px;font-weight:800;overflow:hidden;text-overflow:ellipsis;
  white-space:nowrap;flex:1;min-width:0;letter-spacing:.02em;}
.vo-counter{font-size:12px;color:var(--muted);background:var(--panel2);
  border:1px solid var(--border);border-radius:100px;padding:3px 10px;
  white-space:nowrap;flex-shrink:0;}
.vo-img{flex:1;position:relative;min-height:0;overflow:hidden;}
.img-wrap{width:100%;height:100%;overflow:auto;-webkit-overflow-scrolling:touch;
  display:flex;align-items:flex-start;justify-content:flex-start;cursor:grab;}
#imgStage{position:relative;flex-shrink:0;}
#mainImg{display:block;height:auto;max-width:none;width:100%;user-select:none;-webkit-user-drag:none;}
.img-loading{position:absolute;inset:0;display:none;align-items:center;justify-content:center;
  flex-direction:column;gap:12px;background:var(--bg);font-size:14px;color:var(--muted);z-index:5;}
.img-loading.show{display:flex;}
.spinner{width:22px;height:22px;border:2px solid var(--border);
  border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
.side-nav{position:absolute;top:50%;transform:translateY(-50%);width:40px;height:90px;
  background:rgba(20,36,58,.75);border:1px solid var(--border);border-radius:8px;
  color:var(--text);font-size:28px;cursor:pointer;z-index:10;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .2s,background .15s;}
.side-nav.prev{left:8px;}
.side-nav.next{right:8px;}
.vo-img:hover .side-nav:not(:disabled){opacity:1;}
.side-nav:disabled{pointer-events:none;opacity:0!important;}
.side-nav:hover{background:rgba(43,127,255,.25);}
@media(hover:none){.side-nav:not(:disabled){opacity:.55;}}
.vo-bottom{height:50px;flex-shrink:0;background:var(--panel);border-top:1px solid var(--border);
  display:flex;align-items:center;padding:0 10px;gap:6px;}
.vb-sep{width:1px;height:22px;background:var(--border);margin:0 4px;flex-shrink:0;}
.vb-nav-btn{display:flex;align-items:center;gap:4px;background:transparent;
  border:1px solid var(--border);border-radius:7px;padding:6px 11px;
  font-size:12px;font-weight:700;color:var(--text);font-family:inherit;cursor:pointer;
  white-space:nowrap;transition:border-color .15s,background .15s,color .15s;}
.vb-nav-btn:hover:not(:disabled){border-color:var(--accent);background:var(--panel2);color:var(--accent);}
.vb-nav-btn:disabled{opacity:.3;cursor:not-allowed;}
.vb-zoom{display:flex;align-items:center;gap:4px;flex:1;justify-content:center;}
.zb{width:30px;height:30px;background:transparent;border:1px solid var(--border);border-radius:6px;
  color:var(--text);font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .12s,border-color .12s,color .12s;flex-shrink:0;}
.zb:hover{background:var(--panel2);border-color:var(--accent);color:var(--accent);}
.zb:active{transform:scale(.93);}
.zb.wide{width:auto;padding:0 9px;font-size:11px;font-weight:700;}
#zoomLabel{min-width:42px;text-align:center;font-size:13px;font-weight:700;color:var(--accent);flex-shrink:0;}
.vb-save{background:transparent;border:1px solid var(--border);border-radius:7px;
  padding:6px 11px;font-size:12px;color:var(--text);font-family:inherit;cursor:pointer;
  display:flex;align-items:center;gap:4px;white-space:nowrap;
  transition:border-color .15s,color .15s;flex-shrink:0;}
.vb-save:hover{border-color:var(--accent);color:var(--accent);}
.zoom-hint{position:fixed;bottom:64px;left:50%;transform:translateX(-50%);
  background:rgba(14,36,60,.93);border:1px solid var(--border);color:var(--muted);
  font-size:12px;padding:5px 14px;border-radius:100px;opacity:0;transition:opacity .22s;
  pointer-events:none;z-index:600;white-space:nowrap;}
.zoom-hint.show{opacity:1;}
.toast{position:fixed;bottom:64px;left:50%;transform:translateX(-50%);background:#1a7a3a;
  color:#fff;padding:9px 20px;border-radius:100px;font-size:14px;font-weight:600;
  opacity:0;transition:opacity .25s;z-index:700;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
@media(max-width:520px){
  main{padding:14px 10px;}
  .building-grid{grid-template-columns:repeat(2,1fr);}
  .floor-grid{grid-template-columns:repeat(3,1fr);}
  .room-grid{grid-template-columns:repeat(4,1fr);}
  .vb-nav-btn .lbl,.vb-save .lbl{display:none;}
}

/* ── 器具パネル ── */
.vo-body{flex:1;display:flex;min-height:0;}
.vo-draw{flex:1;min-width:0;display:flex;flex-direction:column;min-height:0;}
#fxPanel{width:min(500px,45vw);flex-shrink:0;background:var(--panel);border-left:1px solid var(--border);
  display:flex;flex-direction:column;min-height:0;transition:transform .25s cubic-bezier(.4,0,.2,1);}
.fp-head{padding:8px 13px 7px;border-bottom:1px solid var(--border);flex-shrink:0;}
.fp-head-t{font-size:12px;font-weight:800;letter-spacing:.04em;display:flex;align-items:center;gap:6px;}
.fp-head-t .dot{width:8px;height:8px;border-radius:50%;background:#e23b3b;box-shadow:0 0 0 3px rgba(226,59,59,.15);}
.fp-head-s{font-size:11px;color:var(--muted);margin-top:2px;}
.fp-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:9px;
  display:grid;grid-template-columns:1fr 1fr;gap:8px;align-content:start;}
.fp-empty{color:var(--muted);font-size:13px;padding:20px;text-align:center;grid-column:1/-1;}
.fp-card{background:var(--panel2);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.fp-card-head{display:flex;align-items:center;gap:7px;padding:6px 8px;border-bottom:1px solid var(--border);}
.fp-sym{font-size:12px;font-weight:900;color:#fff;background:#e23b3b;border-radius:6px;
  padding:3px 7px;letter-spacing:.02em;flex-shrink:0;min-width:46px;text-align:center;}
.fp-meta{min-width:0;}
.fp-model{font-size:11px;font-weight:800;color:#fff;word-break:break-all;line-height:1.25;}
.fp-color{font-size:9.5px;font-weight:800;color:#ffd479;white-space:nowrap;}
.fp-color.c-day{color:#7db8ff;}
.fp-name{font-size:9.5px;color:#b9cce8;margin-top:1px;line-height:1.3;}
.fp-place{font-size:12px;font-weight:700;color:#ffe9a8;margin-top:3px;word-break:break-word;}
.fp-qty{font-weight:700;}
.fp-imgbtn{display:block;width:100%;height:96px;background:#fff;padding:5px;position:relative;pointer-events:none;}
.fp-imgbtn img{display:block;width:100%;height:100%;object-fit:contain;}
.fp-nophoto{background:var(--panel2);display:flex;align-items:center;justify-content:center;
  height:70px;color:var(--muted);font-size:12px;font-weight:700;gap:6px;}
/* 取替不要(除外)オーバーレイ */
.fp-card.is-excluded{opacity:.7;}
.fp-card.is-excluded .fp-card-head{background:rgba(226,59,59,.08);}
.fp-card.is-excluded .fp-sym{background:#6b1f1f;}
.fp-excl-wrap{position:relative;}
.fp-excl-mark{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(8,12,18,.55);pointer-events:none;gap:4px;}
.fp-excl-x{font-size:32px;line-height:1;font-weight:900;color:#ff3b3b;
  text-shadow:0 0 10px rgba(0,0,0,.6),0 0 2px #fff;}
.fp-excl-label{background:#e23b3b;color:#fff;font-size:10px;font-weight:900;letter-spacing:.05em;
  padding:2px 10px;border-radius:100px;box-shadow:0 2px 8px rgba(0,0,0,.5);}
.fp-excl-badge{position:absolute;top:6px;right:6px;background:#e23b3b;color:#fff;font-size:10px;
  font-weight:800;padding:2px 8px;border-radius:100px;z-index:2;letter-spacing:.03em;}
#fxToggle{display:none;position:absolute;right:14px;bottom:64px;z-index:50;
  background:linear-gradient(135deg,var(--accent),#1a5fd6);color:#fff;
  border:2px solid rgba(255,255,255,.3);border-radius:100px;font-family:inherit;
  font-size:14px;font-weight:900;padding:13px 20px;cursor:pointer;
  align-items:center;gap:8px;
  box-shadow:0 4px 18px rgba(43,127,255,.55),0 0 0 0 rgba(43,127,255,.5);
  animation:fxPulse 2.2s ease-in-out infinite;}
@keyframes fxPulse{

.fx-toggle-badge{background:#fff;color:var(--accent);font-size:12px;font-weight:900;

/* 右クリックパン用カーソル */

.img-wrap.panning img{pointer-events:none;}

  .fp-sym{font-size:10px;padding:2px 5px;min-width:auto;}

  .fp-imgbtn{height:62px;padding:3px;}

  .fp-excl-label{font-size:8.5px;padding:1px 7px;}
  .fp-excl-badge{font-size:8.5px;padding:1px 6px;top:4px;right:4px;}

  .vo-bottom{gap:4px;padding:0 6px;}
  .vb-nav-btn{padding:5px 8px;font-size:11px;}
  .vb-zoom{gap:3px;}

/* ── 点滅マーカー ── */
.blink-marker{
  position:absolute;width:34px;height:34px;margin-left:-17px;margin-top:-17px;
  border-radius:50%;pointer-events:none;z-index:50;
  border:3px solid #2b7fff;
  animation:blinkPulse .75s ease-out 5;
}
@keyframes blinkPulse{
  0%{opacity:0;transform:scale(.5);box-shadow:0 0 0 0 rgba(43,127,255,.9);}
  40%{opacity:1;transform:scale(1.1);box-shadow:0 0 0 10px rgba(43,127,255,0);}
  100%{opacity:0;transform:scale(1.5);}
}
.fp-card{cursor:pointer;transition:border-color .15s;}
.fp-card:hover{border-color:var(--accent)!important;}
.fp-card.blink-active{border-color:var(--accent)!important;background:#1c3357!important;}

const SCHED={};
let curBldg=null, curFloor=null, curRoom=null, zoomPct=100, hintTimer=null;
let vacantMode=false;
let flatRooms=[], curIdx=-1;
const ZOOM_MIN=10,ZOOM_MAX=500,STEP_BTN=25,STEP_WHEEL=10;
const $=id=>document.getElementById(id);
function buildFlat(bldg){
  flatRooms=[];
  const floors=STRUCT[bldg];
  if(vacantMode){
    const floorOf={};
    Object.keys(floors).forEach(fl=>floors[fl].forEach(r=>floorOf[r]=Number(fl)));
    (VACANT[bldg]||[]).filter(r=>floorOf[r]!=null)
      .sort((a,b)=>(floorOf[a]-floorOf[b])||(Number(a)-Number(b)))
      .forEach(r=>flatRooms.push({bldg,floor:floorOf[r],room:r}));
    return;
  }
  Object.keys(floors).map(Number).sort((a,b)=>a-b).forEach(fl=>{
    floors[fl].forEach(r=>flatRooms.push({bldg,floor:fl,room:r}));
  });
}
function renderBuildings(){
  const gA=$('buildingGridA'), gS=$('buildingGridS');
  gA.innerHTML=''; gS.innerHTML='';
  $('bldgSecLabel').textContent = vacantMode ? '空家のある棟を選択' : '棟を選択';
  ORDER.forEach(b=>{
    if(!STRUCT[b])return;
    const isS=b.charAt(0)==='S';
    const vac=VACANT[b]||[];
    if(vacantMode && !vac.length) return;
    let total=0;Object.values(STRUCT[b]).forEach(a=>total+=a.length);
    const d=document.createElement('div');
    d.className='building-card '+(isS?'s-b':'a-b')+(vacantMode?' vac-card':'');
    const sub = vacantMode
      ? '空家 '+vac.length+' 室'
      : (total+' 室'+(vac.length?'<span class="vacant-badge">空家 '+vac.length+'</span>':''));
    d.innerHTML='<div class="bc-name">'+b+'</div><div class="bc-count">'+sub+'</div>';
    d.onclick=()=>selectBuilding(b);
    (isS?gS:gA).appendChild(d);
  });
  $('buildingGridA').parentElement.style.display = gA.children.length ? '' : 'none';
  $('buildingGridS').parentElement.style.display = gS.children.length ? '' : 'none';
  const vr=$('vacantRow'); vr.innerHTML='';
  const vb=document.createElement('button');
  if(vacantMode){
    vb.className='vacant-btn exit';
    vb.innerHTML='← 全棟表示に戻る';
    vb.onclick=()=>exitVacant();
  }else{
    const t=Object.values(VACANT).reduce((s,a)=>s+a.length,0);
    vb.className='vacant-btn';
    vb.innerHTML='🏠 空家のみ表示 <span class="v-count">'+t+' 室</span>';
    vb.onclick=()=>enterVacant();
  }
  vr.appendChild(vb);
}

function zoomFitAll(){const w=$('imgWrap'),img=$('mainImg');if(!img.naturalWidth)return;const rect=w.getBoundingClientRect();const cw=rect.width||w.offsetWidth;const ch=rect.height||w.offsetHeight;if(!cw||!ch){setTimeout(zoomFitAll,40);return;}const pctH=Math.floor(ch*img.naturalWidth/(img.naturalHeight*cw)*100);applyZoom(Math.max(1,Math.min(100,pctH)));w.scrollTop=0;w.scrollLeft=0;}

// 器具位置(赤丸)全体が画面に収まる最大ズームで表示
// 座標が部屋帰属(r)を持つ場合は現在の部屋の分だけを対象にする
// （rは号室の完全一致または末尾一致: 例 r:"15" は 215/315 に一致）
function _roomPts(dwg){
  const all=(dwg&&SYMBOL_COORDS[dwg])||[];
  return all.filter(p=>!p.r||String(curRoom).endsWith(p.r));
}
function zoomToSymbols(){
  const dwg=DRAWINGS[curBldg+'|'+curRoom];
  const pts=_roomPts(dwg);
  if(!pts||!pts.length){zoomFitAll();return;}
  const wrap=$('imgWrap'),img=$('mainImg');
  if(!img.naturalWidth)return;
  const rect=wrap.getBoundingClientRect();
  const cw=rect.width||wrap.clientWidth, ch=rect.height||wrap.clientHeight;
  if(!cw||!ch){setTimeout(zoomToSymbols,40);return;}
  let minX=100,maxX=0,minY=100,maxY=0;
  pts.forEach(p=>{if(p.x<minX)minX=p.x;if(p.x>maxX)maxX=p.x;if(p.y<minY)minY=p.y;if(p.y>maxY)maxY=p.y;});
  // 余白と最小範囲（1点だけの部屋でも極端に寄りすぎないように）
  const padX=Math.max(5,(maxX-minX)*0.2), padY=Math.max(5,(maxY-minY)*0.2);
  minX=Math.max(0,minX-padX); maxX=Math.min(100,maxX+padX);
  minY=Math.max(0,minY-padY); maxY=Math.min(100,maxY+padY);
  let bw=maxX-minX, bh=maxY-minY;
  const MINW=24,MINH=18;
  if(bw<MINW){const c=(minX+maxX)/2;minX=Math.min(100-MINW,Math.max(0,c-MINW/2));bw=MINW;}
  if(bh<MINH){const c=(minY+maxY)/2;minY=Math.min(100-MINH,Math.max(0,c-MINH/2));bh=MINH;}
  const natW=img.naturalWidth, natH=img.naturalHeight;
  const pctX=10000/bw;                                   // 範囲幅を画面幅いっぱいに
  const pctY=(ch*100/bh)*natW/natH/cw*100;               // 範囲高さを画面高さいっぱいに
  const pct=Math.max(ZOOM_MIN,Math.min(ZOOM_MAX,Math.floor(Math.min(pctX,pctY))));
  zoomPct=pct;$('zoomLabel').textContent=pct+'%';
  const stage=document.getElementById('imgStage');
  stage.style.width=(cw*pct/100)+'px';
  requestAnimationFrame(()=>{
    const W=stage.offsetWidth||cw*pct/100, H=W*natH/natW;
    wrap.scrollLeft=((minX+bw/2)/100)*W-cw/2;
    wrap.scrollTop=((minY+bh/2)/100)*H-ch/2;
    _refreshBMarkers();
  });
}

let swipeX=0,swipeY=0,swipeMulti=false;

function showHint(m){const h=$('zoomHint');h.textContent=m;h.classList.add('show');clearTimeout(hintTimer);hintTimer=setTimeout(()=>h.classList.remove('show'),900);}

function _loadImg(src){return new Promise((res,rej)=>{const i=new Image();i.onload=()=>res(i);i.onerror=rej;i.src=src;});}
function _rr(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.arcTo(x+w,y,x+w,y+h,r);c.arcTo(x+w,y+h,x,y+h,r);c.arcTo(x,y+h,x,y,r);c.arcTo(x,y,x+w,y,r);c.closePath();}
function _roomCropRect(img){
  const dwg=DRAWINGS[curBldg+'|'+curRoom];
  const pts=_roomPts(dwg);
  const W=img.naturalWidth,H=img.naturalHeight;
  if(!pts||!pts.length) return {sx:0,sy:0,sw:W,sh:H};
  let a=100,b=0,c2=100,d=0;
  pts.forEach(p=>{if(p.x<a)a=p.x;if(p.x>b)b=p.x;if(p.y<c2)c2=p.y;if(p.y>d)d=p.y;});
  const px=Math.max(7,(b-a)*.3),py=Math.max(6,(d-c2)*.3);
  a=Math.max(0,a-px);b=Math.min(100,b+px);c2=Math.max(0,c2-py);d=Math.min(100,d+py);
  if(b-a<30){const m=(a+b)/2;a=Math.max(0,m-15);b=Math.min(100,m+15);}
  if(d-c2<22){const m=(c2+d)/2;c2=Math.max(0,m-11);d=Math.min(100,m+11);}
  return {sx:a/100*W,sy:c2/100*H,sw:(b-a)/100*W,sh:(d-c2)/100*H};
}
async function composeRoomSheet(){
  const W=1240,H=1754,M=54;
  const cv=document.createElement('canvas');cv.width=W;cv.height=H;
  const c=cv.getContext('2d');
  c.fillStyle='#fff';c.fillRect(0,0,W,H);
  const FONT='"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif';
  // ヘッダー
  c.fillStyle='#14243a';c.font='900 42px '+FONT;
  c.fillText(curBldg+' '+curRoom+'号室',M,M+40);
  c.font='500 20px '+FONT;c.fillStyle='#666';
  const sub='県営北方住宅 室内照明LED化改修工事';
  c.fillText(sub,W-M-c.measureText(sub).width,M+36);
  c.strokeStyle='#14243a';c.lineWidth=3;
  c.beginPath();c.moveTo(M,M+58);c.lineTo(W-M,M+58);c.stroke();
  // 器具データ
  const key=curBldg+'|'+curRoom;
  const items=ROOM_FIXTURES[key]||[];
  const exclSet=new Set(EXCLUDED_ROOMS[key]||[]);
  const rows=Math.max(1,Math.ceil(items.length/3));
  const cardH=rows>1?280:300;
  const fxTop=H-M-rows*cardH-(rows-1)*16-34;
  // 図面（自室範囲を切り抜き）
  const img=$('mainImg');
  const box={x:M,y:M+76,w:W-2*M,h:fxTop-(M+76)-26};
  const r=_roomCropRect(img);
  const sc=Math.min(box.w/r.sw,box.h/r.sh);
  const dw=r.sw*sc,dh=r.sh*sc;
  c.strokeStyle='#c5cedd';c.lineWidth=2;c.strokeRect(box.x,box.y,box.w,box.h);
  c.drawImage(img,r.sx,r.sy,r.sw,r.sh,box.x+(box.w-dw)/2,box.y+(box.h-dh)/2,dw,dh);
  // 器具リスト見出し
  c.fillStyle='#14243a';c.font='800 22px '+FONT;
  const qtyAll=items.reduce((s,i)=>s+i.p.reduce((t,pq)=>t+pq[1],0),0);
  c.fillText('改修器具リスト　'+items.length+'種 / 計'+qtyAll+'台',M,fxTop-6);
  // 写真ロード
  const ph={};
  await Promise.all(items.map(it=>_loadImg('photos/'+it.s.toLowerCase()+'.jpg').then(i=>ph[it.s]=i).catch(()=>{})));
  // カード
  const gap=16,cw=(W-2*M-gap*2)/3;
  items.forEach((it,i)=>{
    const col=i%3,row=(i/3)|0;
    const x=M+col*(cw+gap),y=fxTop+14+row*(cardH+16);
    const info=FIXTURE_INFO[it.s]||{};
    const isEx=exclSet.has(it.s);
    c.strokeStyle=isEx?'#d99':'#b8c2d4';c.lineWidth=2;
    _rr(c,x,y,cw,cardH,10);c.stroke();
    // 記号バッジ
    c.fillStyle=isEx?'#a55':'#e23b3b';_rr(c,x+12,y+12,110,38,7);c.fill();
    c.fillStyle='#fff';c.font='900 21px '+FONT;
    c.fillText(it.s,x+12+55-c.measureText(it.s).width/2,y+12+27);
    // 型番・色温度
    c.fillStyle='#111';c.font='800 19px '+FONT;
    c.fillText(info.model||'',x+132,y+28);
    c.font='700 15px '+FONT;c.fillStyle=(info.color||'').indexOf('昼白色')===0?'#1668d9':'#c07a1f';
    c.fillText(info.color||'',x+132,y+50);
    // 名称・場所
    c.fillStyle='#444';c.font='500 14px '+FONT;
    c.fillText((info.name||'').slice(0,26),x+12,y+72);
    const places=it.p.map(pq=>pq[0]+'×'+pq[1]).join(' ・ ');
    c.fillStyle='#111';c.font='700 16px '+FONT;
    c.fillText(places,x+12,y+96);
    // 写真
    const pb={x:x+12,y:y+108,w:cw-24,h:cardH-120};
    if(ph[it.s]){
      const im=ph[it.s];
      const s2=Math.min(pb.w/im.naturalWidth,pb.h/im.naturalHeight);
      c.drawImage(im,pb.x+(pb.w-im.naturalWidth*s2)/2,pb.y+(pb.h-im.naturalHeight*s2)/2,im.naturalWidth*s2,im.naturalHeight*s2);
    }
    if(isEx){
      c.fillStyle='rgba(255,255,255,.55)';c.fillRect(x+2,y+2,cw-4,cardH-4);
      c.fillStyle='#e23b3b';c.font='900 30px '+FONT;
      const t='✕ 取替不要';
      c.fillText(t,x+cw/2-c.measureText(t).width/2,y+cardH/2+10);
    }
  });
  return cv;
}
function _dlBlob(blob,name){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),4000);}

async function saveRoomPDF(){
  if(!$('mainImg').naturalWidth){showToast('図面の読み込み中です');return;}
  showToast('PDFを作成中...');
  const cv=await composeRoomSheet();
  const durl=cv.toDataURL('image/jpeg',0.92);
  const bin=atob(durl.split(',')[1]);
  const jpeg=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++)jpeg[i]=bin.charCodeAt(i);
  _dlBlob(new Blob([_jpegToPdf(jpeg,cv.width,cv.height)],{type:'application/pdf'}),curBldg+'_'+curRoom+'号室.pdf');

}
// JPEG1枚をA4縦1ページに埋め込む最小PDFを生成
function _jpegToPdf(jpeg,w,h){
  const enc=s=>new TextEncoder().encode(s);
  const pw=595.28,ph=841.89;
  const parts=[];let off=0;const ofs=[];
  const push=b=>{parts.push(b);off+=b.length;};
  push(enc('%PDF-1.4\n'));
  const obj=(n,body)=>{ofs[n]=off;push(enc(n+' 0 obj\n'+body+'\nendobj\n'));};
  obj(1,'<< /Type /Catalog /Pages 2 0 R >>');
  obj(2,'<< /Type /Pages /Kids [3 0 R] /Count 1 >>');
  obj(3,'<< /Type /Page /Parent 2 0 R /MediaBox [0 0 '+pw+' '+ph+'] /Contents 4 0 R /Resources << /XObject << /Im1 5 0 R >> >> >>');
  const ct='q '+pw+' 0 0 '+ph+' 0 0 cm /Im1 Do Q';
  obj(4,'<< /Length '+ct.length+' >>\nstream\n'+ct+'\nendstream');
  ofs[5]=off;
  push(enc('5 0 obj\n<< /Type /XObject /Subtype /Image /Width '+w+' /Height '+h+' /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length '+jpeg.length+' >>\nstream\n'));
  push(jpeg);
  push(enc('\nendstream\nendobj\n'));
  const xref=off;
  let x='xref\n0 6\n0000000000 65535 f \n';
  for(let i=1;i<=5;i++)x+=String(ofs[i]).padStart(10,'0')+' 00000 n \n';
  x+='trailer\n<< /Size 6 /Root 1 0 R >>\nstartxref\n'+xref+'\n%%EOF';
  push(enc(x));
  const out=new Uint8Array(off);let o=0;
  for(const p of parts){out.set(p,o);o+=p.length;}
  return out;
}
function renderBC(){
  const bc=$('breadcrumb');
  if($('viewerOverlay').classList.contains('show')){bc.style.display='none';return;}
  const active=document.querySelector('.screen.active')?.id;
  if(!active||active==='sBuilding'){bc.style.display='none';return;}
  bc.style.display='flex';bc.innerHTML='';
  const mk=(label,fn)=>{const s=document.createElement('span');s.textContent=label;s.className=fn?'bc-link':'bc-cur';if(fn)s.onclick=fn;return s;};
  const sep=()=>{const s=document.createElement('span');s.className='bc-sep';s.textContent='›';return s;};
  bc.appendChild(mk('棟一覧',()=>goHome()));
  if(active==='sMap'){bc.appendChild(sep());bc.appendChild(mk('住戸割付図',null));return;}
  if(vacantMode){
    bc.appendChild(sep());bc.appendChild(mk('空家',()=>enterVacant()));
    if(active==='sRoom'){bc.appendChild(sep());bc.appendChild(mk(curBldg,null));}
    return;
  }
  if(active==='sFloor'){bc.appendChild(sep());bc.appendChild(mk(curBldg,null));}
  if(active==='sRoom'){bc.appendChild(sep());bc.appendChild(mk(curBldg,()=>selectBuilding(curBldg)));bc.appendChild(sep());bc.appendChild(mk(curFloor+'階',null));}
}

function renderFxPanel(bldg, room){
  const key=bldg+'|'+room;
  const items=ROOM_FIXTURES[key]||[];
  const list=document.getElementById('fpList');
  const sub =document.getElementById('fpSub');
  const badge=document.getElementById('fxToggleBadge');
  list.innerHTML='';
  list.dataset.n=String(items.length);
  if(!items.length){
    list.innerHTML='<div class="fp-empty">器具データなし</div>';
    sub.textContent='改修器具データなし';
    if(badge) badge.textContent='0';
    return;
  }
  const exclSet = new Set(EXCLUDED_ROOMS[key] || []);
  const qtyOf=it=>it.p.reduce((s,pq)=>s+pq[1],0);
  const total=items.reduce((s,i)=>s+qtyOf(i),0);
  const exclQty=items.filter(i=>exclSet.has(i.s)).reduce((s,i)=>s+qtyOf(i),0);
  const activeCount=items.filter(i=>!exclSet.has(i.s)).length;
  if(badge) badge.textContent=String(activeCount);
  sub.textContent='器具 '+items.length+' 種 / 計 '+total+' 台'
    +(exclQty>0?'　（うち取替不要 '+exclQty+' 台）':'');
  items.forEach(it=>{
    const info=FIXTURE_INFO[it.s]||{};
    const isExcl=exclSet.has(it.s);
    const places=it.p.map(pq=>pq[0]+'×'+pq[1]).join(' ・ ');
    const enc=encodeURIComponent(it.s.toLowerCase());
    const photoBtn='<div class="fp-imgbtn">'
      +'<img src="photos/'+enc+'.jpg" alt="'+it.s+'" loading="lazy"></div>';
    const imgHtml = isExcl
      ? '<div class="fp-excl-wrap">'+photoBtn
        +'<div class="fp-excl-mark"><span class="fp-excl-x">✕</span>'
        +'<span class="fp-excl-label">取替不要</span></div></div>'
      : photoBtn;
    const badgeHtml = isExcl ? '<span class="fp-excl-badge">取替不要</span>' : '';
    list.insertAdjacentHTML('beforeend',
      '<div class="fp-card'+(isExcl?' is-excluded':'')+'" style="position:relative;" onclick="onFpCardClick(this,\''+it.s+'\')">'+badgeHtml
      +'<div class="fp-card-head">'
      +'<span class="fp-sym">'+it.s+'</span>'
      +'<div class="fp-meta">'
      +'<div class="fp-model">'+(info.model||'')+(info.color?' <span class="fp-color'+(info.color.indexOf('昼白色')===0?' c-day':'')+'">'+info.color+'</span>':'')+'</div>'
      +(info.name?'<div class="fp-name">'+info.name+'</div>':'')
      +'<div class="fp-place">'+places+' <span class="fp-qty">計×'+qtyOf(it)+'</span></div>'
      +'</div></div>'
      +imgHtml
      +'</div>');
  });
}

// 割付図: ホイール拡大縮小・左ドラッグパン (PC) / ピンチズーム (スマホ)
(function(){
  const wrap=$('mapWrap'), inner=$('mapInner');
  if(!wrap) return;
  const zNow=()=>inner.offsetWidth/Math.max(1,wrap.clientWidth)*100;
  function setZ(pct,cx,cy){
    pct=Math.max(100,Math.min(500,pct));
    const pw=inner.offsetWidth||1, ph=inner.offsetHeight||1;
    if(cx==null){cx=wrap.clientWidth/2;cy=wrap.clientHeight/2;}
    const ax=(cx+wrap.scrollLeft)/pw, ay=(cy+wrap.scrollTop)/ph;
    inner.style.width=(wrap.clientWidth*pct/100)+'px';
    wrap.scrollLeft=ax*inner.offsetWidth-cx;
    wrap.scrollTop=ay*inner.offsetHeight-cy;
  }
  wrap.addEventListener('wheel',e=>{
    e.preventDefault();
    const r=wrap.getBoundingClientRect();
    setZ(zNow()*(e.deltaY<0?1.15:0.87),e.clientX-r.left,e.clientY-r.top);
  },{passive:false});
  let panning=false,sx=0,sy=0,sl=0,st=0,moved=false;
  wrap.addEventListener('mousedown',e=>{
    if(e.button!==0) return;
    panning=true;moved=false;sx=e.clientX;sy=e.clientY;sl=wrap.scrollLeft;st=wrap.scrollTop;
    wrap.classList.add('panning');
    e.preventDefault();
  });
  window.addEventListener('mousemove',e=>{
    if(!panning) return;
    const dx=e.clientX-sx, dy=e.clientY-sy;
    if(Math.abs(dx)>3||Math.abs(dy)>3) moved=true;
    wrap.scrollLeft=sl-dx; wrap.scrollTop=st-dy;
  });
  window.addEventListener('mouseup',()=>{
    if(!panning) return;
    panning=false;wrap.classList.remove('panning');
    setTimeout(()=>{moved=false;},50);
  });
  window.addEventListener('blur',()=>{panning=false;wrap.classList.remove('panning');});
  wrap.addEventListener('click',e=>{if(moved){e.stopPropagation();e.preventDefault();}},true);
  let pd=0,pz=100;
  wrap.addEventListener('touchstart',e=>{
    if(e.touches.length===2){
      pd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      pz=zNow();
      e.preventDefault();
    }
  },{passive:false});
  wrap.addEventListener('touchmove',e=>{
    if(e.touches.length===2&&pd>0){
      e.preventDefault();
      const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      const r=wrap.getBoundingClientRect();
      setZ(pz*d/pd,(e.touches[0].clientX+e.touches[1].clientX)/2-r.left,(e.touches[0].clientY+e.touches[1].clientY)/2-r.top);
    }
  },{passive:false});
  wrap.addEventListener('touchend',e=>{if(e.touches.length<2)pd=0;});
})();

// 図面ビューア: ピンチズーム (スマホ)
(function(){
  const wrap=$('imgWrap');
  let pd=0,pz=100;
  wrap.addEventListener('touchstart',e=>{
    if(e.touches.length===2){
      pd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      pz=zoomPct;
      e.preventDefault();
    }
  },{passive:false});
  wrap.addEventListener('touchmove',e=>{
    if(e.touches.length===2&&pd>0){
      e.preventDefault();
      const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      const r=wrap.getBoundingClientRect();
      applyZoom(pz*d/pd,(e.touches[0].clientX+e.touches[1].clientX)/2-r.left,(e.touches[0].clientY+e.touches[1].clientY)/2-r.top);
    }
  },{passive:false});
  wrap.addEventListener('touchend',e=>{if(e.touches.length<2)pd=0;});
})();

// 左/右クリックドラッグでパン (PC)
(function(){
  const wrap=$('imgWrap');
  let panning=false,panStartX=0,panStartY=0,panSL=0,panST=0,moved=false;
  wrap.addEventListener('contextmenu',e=>{ if(moved) e.preventDefault(); });
  wrap.addEventListener('mousedown',e=>{
    if(e.button!==0 && e.button!==2) return;
    panning=true; moved=false;
    panStartX=e.clientX; panStartY=e.clientY;
    panSL=wrap.scrollLeft; panST=wrap.scrollTop;
    wrap.classList.add('panning');
    e.preventDefault();
  });
  window.addEventListener('mousemove',e=>{
    if(!panning) return;
    const dx=e.clientX-panStartX, dy=e.clientY-panStartY;
    if(Math.abs(dx)>3||Math.abs(dy)>3) moved=true;
    wrap.scrollLeft=panSL-dx;
    wrap.scrollTop=panST-dy;
  });
  window.addEventListener('mouseup',e=>{
    if(!panning) return;
    panning=false;
    wrap.classList.remove('panning');
    setTimeout(()=>{moved=false;},50);
  });
  window.addEventListener('blur',()=>{panning=false;wrap.classList.remove('panning');});
})();

// ── 点滅マーカー ──────────────────────────────────────────
let _bMarkers=[];
function _clearBMarkers(){_bMarkers.forEach(m=>m.remove());_bMarkers=[];}
function _placeBMarkers(syms){
  _clearBMarkers();
  const dwg=DRAWINGS[curBldg+'|'+curRoom];
  if(!dwg||!SYMBOL_COORDS[dwg]) return;
  const stage=document.getElementById('imgStage');
  const wrap=$('imgWrap');
  const img=$('mainImg');
  const baseSym=s=>s.replace(/-\d$/,'');
  // 部屋帰属で絞り、枝番完全一致（枝番なし座標は基本記号で照合）
  const matched=_roomPts(dwg).filter(pt=>
    syms.some(s=>pt.s===s || pt.s===baseSym(s)));
  if(!matched.length) return;
  // 選択した器具の全マーカーが画面に収まるようズーム調整（収まらない時だけズームアウト）
  const rect=wrap.getBoundingClientRect();
  const cw=rect.width||wrap.clientWidth, ch=rect.height||wrap.clientHeight;
  let minX=100,maxX=0,minY=100,maxY=0;
  matched.forEach(p=>{if(p.x<minX)minX=p.x;if(p.x>maxX)maxX=p.x;if(p.y<minY)minY=p.y;if(p.y>maxY)maxY=p.y;});
  const padX=Math.max(6,(maxX-minX)*0.15), padY=Math.max(6,(maxY-minY)*0.15);
  minX=Math.max(0,minX-padX); maxX=Math.min(100,maxX+padX);
  minY=Math.max(0,minY-padY); maxY=Math.min(100,maxY+padY);
  const bw=maxX-minX, bh=maxY-minY;
  const natW=img.naturalWidth||1, natH=img.naturalHeight||1;
  const pctX=10000/bw;
  const pctY=(ch*100/bh)*natW/natH/cw*100;
  const fitPct=Math.max(ZOOM_MIN,Math.min(ZOOM_MAX,Math.floor(Math.min(pctX,pctY))));
  if(fitPct<zoomPct){
    zoomPct=fitPct;$('zoomLabel').textContent=fitPct+'%';
    stage.style.width=(cw*fitPct/100)+'px';
  }
  requestAnimationFrame(()=>{
    const sw=stage.offsetWidth||1;
    const sh=stage.offsetHeight||sw*natH/natW;
    matched.forEach(pt=>{
      const el=document.createElement('div');
      el.className='blink-marker';
      el.style.left=(pt.x/100*sw)+'px';
      el.style.top=(pt.y/100*sh)+'px';
      el.dataset.ox=pt.x;
      el.dataset.oy=pt.y;
      stage.appendChild(el);
      _bMarkers.push(el);
    });
    // マーカー範囲の中心へスクロール
    wrap.scrollTo({left:((minX+bw/2)/100)*sw-cw/2, top:((minY+bh/2)/100)*sh-ch/2, behavior:'smooth'});
  });
}
function onFpCardClick(card,sym){
  document.querySelectorAll('.fp-card.blink-active').forEach(c=>c.classList.remove('blink-active'));
  card.classList.add('blink-active');
  _placeBMarkers([sym]);
}
